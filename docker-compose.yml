version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: firewatch-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - firewatch_mongo_data:/data/db
    networks:
      - firewatch-net

  backend:
    build: ./backend
    container_name: firewatch-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB=firewatch
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/models:/app/models
    depends_on:
      - mongodb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - firewatch-net

  frontend:
    build: ./frontend
    container_name: firewatch-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - firewatch-net

volumes:
  firewatch_mongo_data:

networks:
  firewatch-net:
    driver: bridge
